name: mac-novnc

on:
  workflow_dispatch:

jobs:
  mac:
    runs-on: macos-latest

    steps:
      - name: Enable VNC
        run: |
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
          -activate \
          -configure \
          -access -on \
          -restart \
          -agent \
          -privs -all 
          sudo launchctl kickstart -k system/com.apple.screensharing
          sudo sqlite3 /Library/Application\ Support/com.apple.TCC/TCC.db \
          "INSERT OR REPLACE INTO access VALUES('kTCCServiceScreenCapture','noVNC',0,1,1,NULL,NULL,NULL,'UNUSED',NULL,0,1541440109);"
          lsof -iTCP:5900 -sTCP:LISTEN

      - name: Install noVNC
        run: |
          lsof -i :5900 || echo "no vnc server on 5900"
          git clone https://github.com/novnc/noVNC.git
          git clone https://github.com/novnc/websockify.git noVNC/utils/websockify

      - name: Start noVNC
        run: |
          cd noVNC
          nohup ./utils/novnc_proxy --vnc localhost:5900 --listen 6080 &

      - name: Install cloudflared
        run: brew install cloudflared

      - name: Expose web UI
        run: |
          cloudflared tunnel --url http://localhost:6080
